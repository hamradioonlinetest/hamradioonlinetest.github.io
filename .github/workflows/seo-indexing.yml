name: Verify SEO indexing

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify SEO indexing metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify SEO indexing
        run: npm run verify:seo-indexing

      - name: Upload site files for debugging
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: site-files
          path: |
            **/*.html
            robots.txt
            sitemap.xml
          if-no-files-found: ignore
